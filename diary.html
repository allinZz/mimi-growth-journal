        }

            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .diary-date h3 {
            font-size: 1.5rem;
            margin: 0;
        }
        
        .diary-date p {
            margin: 5px 0 0;

        }
        
        .diary-content {
            padding: 30px;
        }
        
        .diary-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--light);
        }
        
        .diary-stat {
            text-align: center;
        }
        
        .diary-stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
        }
        
        .diary-stat-label {
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .diary-excerpt {
            color: var(--gray);
            line-height: 1.8;
            margin-bottom: 20px;
        }
        
        .diary-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: var(--light);
            color: var(--dark);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .export-section {
            background: var(--light);
            padding: 40px;
            border-radius: var(--radius-lg);
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>

    <script src="js/main.js"></script>
    <script>
        // 加载日记列表
        async function loadDiaryList() {
            try {
                const response = await fetch('stats.json');
                const stats = await response.json();
                const dates = stats.memory_dates || [];
                
                const container = document.getElementById('diary-container');
                
                if (dates.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: var(--gray); grid-column: 1/-1;">暂无日记</p>';
                    return;
                }
                
                let html = '';
                
                for (const date of dates.reverse()) {
                    try {
                        const response = await fetch(`../memory/${date}.md`);
                        if (response.ok) {
                            const content = await response.text();
                            const excerpt = extractDiaryExcerpt(content, date);
                            
                            html += `
                                <div class="diary-card" onclick="viewDiary('${date}')">
                                    <div class="diary-date">
                                        <h3>${formatDateChinese(date)}</h3>
                                        <p>${getWeekday(date)}</p>
                                    </div>
                                    <div class="diary-content">
                                        <div class="diary-stats">
                                            <div class="diary-stat">
                                                <div class="diary-stat-number">${excerpt.skills || '-'}</div>
                                                <div class="diary-stat-label">技能</div>
                                            </div>
                                            <div class="diary-stat">
                                                <div class="diary-stat-number">${excerpt.tasks || '-'}</div>
                                                <div class="diary-stat-label">任务</div>
                                            </div>
                                            <div class="diary-stat">
                                                <div class="diary-stat-number">${excerpt.events || '-'}</div>
                                                <div class="diary-stat-label">事件</div>
                                            </div>
                                        </div>
                                        <div class="diary-excerpt">${excerpt.text}</div>
                                        ${excerpt.tags ? `
                                            <div class="diary-tags">
                                                ${excerpt.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                        }
                    } catch (e) {
                        console.error(`Error loading ${date}:`, e);
                    }
                }
                
                container.innerHTML = html;
            } catch (e) {
                console.error('Diary load error:', e);
                document.getElementById('diary-container').innerHTML = '<p style="text-align: center; color: var(--gray); grid-column: 1/-1;">加载失败</p>';
            }
        }
        
        function extractDiaryExcerpt(content, date) {
            const lines = content.split('\n');
            let skills = null;
            let tasks = null;
            let events = null;
            let tags = [];
            let text = '';
            
            // 统计 ✅ 标记
            const checkmarks = (content.match(/✅/g) || []).length;
            tasks = checkmarks;
            
            // 提取事件数（表格行数）
            const tableRows = (content.match(/\|/g) || []).length;
            events = Math.floor(tableRows / 10);
            
            // 提取前 150 字
            const plainText = content.replace(/[#*`\[\]]/g, '').trim();
            text = plainText.substring(0, 150) + '...';
            
            return { skills, tasks, events, tags, text };
        }
        
        function formatDateChinese(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }
        
        function getWeekday(dateStr) {
            const date = new Date(dateStr);
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return weekdays[date.getDay()];
        }
        
        function viewDiary(date) {
            window.open(`memory/${date}.md`, '_blank');
        }
        
        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', loadDiaryList);
    </script>
